name: Pre-release Build Check

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache cibuildwheel downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/Library/Caches/cibuildwheel
          key: cibuildwheel-${{ runner.os }}-v2.22.0
      - name: Prime macOS virtualenv cache
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/Caches/cibuildwheel"
          target="$HOME/Library/Caches/cibuildwheel/virtualenv-20.27.1.pyz"
          if [ ! -f "$target" ]; then
            curl --fail --location \
              --retry 5 --retry-delay 2 --retry-all-errors \
              --header "Authorization: Bearer ${{ github.token }}" \
              --header "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/pypa/get-virtualenv/contents/public/virtualenv.pyz?ref=20.27.1" \
              --output "$target"
          fi
      - name: Prime Windows virtualenv cache
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = Join-Path $env:LOCALAPPDATA "pypa\cibuildwheel\Cache"
          $target = Join-Path $cacheDir "virtualenv-20.27.1.pyz"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          if (-not (Test-Path $target)) {
            $headers = @{
              Authorization = "Bearer ${{ github.token }}"
              Accept = "application/vnd.github.raw"
            }
            Invoke-WebRequest -Headers $headers -Uri "https://api.github.com/repos/pypa/get-virtualenv/contents/public/virtualenv.pyz?ref=20.27.1" -OutFile $target
          }
      - name: Build wheels with retry
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==2.22.0
          for attempt in 1 2 3; do
            echo "cibuildwheel attempt ${attempt}/3"
            python -m cibuildwheel . --output-dir wheelhouse && break
            if [ "${attempt}" -eq 3 ]; then
              echo "cibuildwheel failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 30))
          done
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7
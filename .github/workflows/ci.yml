name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: python -m pip install --upgrade pip build pytest
      - name: Refresh vendor snapshot (optional)
        run: |
          if [ -d ./OpenCRG ]; then
            python tools/vendor_snapshot.py --source ./OpenCRG
          else
            echo "OpenCRG source not found in CI checkout; using committed vendor snapshot."
          fi
      - name: Build sdist and wheel
        run: python -m build
      - name: Install wheel
        run: python -m pip install dist/*.whl
      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
